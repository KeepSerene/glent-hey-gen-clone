<svg 
  width="64" 
  height="64" 
  viewBox="0 0 64 64" 
  xmlns="http://www.w3.org/2000/svg"
  aria-label="Glent Logo"
>
  <!-- 
    Left Side: Human Silhouette
    A smooth, solid geometric curve representing the human element.
  -->
  <path 
    d="M 31 10 C 19 10, 13 18, 13 28 C 13 34, 17 38, 21 42 C 11 46, 3 54, 3 64 L 31 64 Z" 
    fill="#aac7ff" 
  />

  <!-- 
    Right Side: Audio Equalizer Bars
    Thick, dense vertical bars representing the generated voice/audio.
    Spaced optimally to create clear negative space and remain visible at small sizes.
  -->
  <rect x="35" y="12" width="6" height="52" rx="2" fill="#aac7ff" />
  <rect x="44" y="24" width="6" height="40" rx="2" fill="#aac7ff" />
  <rect x="53" y="38" width="6" height="26" rx="2" fill="#aac7ff" />
</svg>
